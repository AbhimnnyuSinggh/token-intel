name: Trivy Image Scan

on:
     workflow_call:
        

jobs:
    trivy-scan:
        runs-on: ubuntu-latest

        steps:
            - name: Scan Docker Image
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: ${{ vars.DOCKERHUB_USER }}/token-intel:${{ github.sha }}
                format: table
                exit-code: 1
                severity: CRITICAL , HIGH 


