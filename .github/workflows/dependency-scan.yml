name: Dependency Scan

on:
    push:
        branches: [main]
    workflow_call:

jobs:
    dependency-scan:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 20
            
            - name: Install Dependencies
              run: npm install --legacy-peer-deps

            - name: Run npm audit
              run: npm audit --audit-level=high
