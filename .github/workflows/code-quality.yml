name: Code Quality

on:
    push:
        branches: [main]

jobs:
    code-quality:
        runs-on: ubuntu-latest

        steps:
            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with: 
                node-version: 20

            - name: Install Dependencies
              run: npm install --legacy-peer-deps
              working-directory: ./token-intel

              #Check Linting

            - name: Lint Check
              run: npm run lint
              working-directory: ./token-intel

            #Security Check

            - name: Code Security Audit
              run: npm audit --audit-level=high
              working-directory: ./token-intel
        
            #Build Check

            - name: Build App
              run: npm run build
              working-directory: ./token-intel
